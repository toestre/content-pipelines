<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 120" width="920" height="120">
  <title>Article Translator flow</title>
  <defs>
    <style>
      .box { fill: #e1f5ff; stroke: #2c5282; stroke-width: 1.5; rx: 6; }
      .box-end { fill: #d4edda; stroke: #276749; stroke-width: 1.5; rx: 6; }
      .txt { font-family: system-ui, sans-serif; font-size: 13px; fill: #1a202c; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4a5568"/>
    </marker>
  </defs>
  <rect class="box" x="10" y="35" width="130" height="50"/>
  <text class="txt" x="75" y="58" text-anchor="middle">n8n Form</text>
  <text class="txt" x="75" y="74" text-anchor="middle" font-size="11">URL input</text>
  <rect class="box" x="170" y="35" width="130" height="50"/>
  <text class="txt" x="235" y="58" text-anchor="middle">Firecrawl</text>
  <text class="txt" x="235" y="74" text-anchor="middle" font-size="11">extract</text>
  <rect class="box" x="330" y="35" width="130" height="50"/>
  <text class="txt" x="395" y="58" text-anchor="middle">LLM</text>
  <text class="txt" x="395" y="74" text-anchor="middle" font-size="11">EN’DE</text>
  <rect class="box" x="490" y="35" width="150" height="50"/>
  <text class="txt" x="565" y="58" text-anchor="middle">Markdown</text>
  <text class="txt" x="565" y="74" text-anchor="middle" font-size="11">+ YAML</text>
  <rect class="box-end" x="670" y="35" width="130" height="50"/>
  <text class="txt" x="735" y="65" text-anchor="middle">Email</text>
  <path class="arrow" d="M140,60 H170"/>
  <path class="arrow" d="M300,60 H330"/>
  <path class="arrow" d="M460,60 H490"/>
  <path class="arrow" d="M640,60 H670"/>
</svg>
